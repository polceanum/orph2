seed: 0

benchmark:
  name: minigrid_empty_random_ppo_smoke_fullobs
  observation_mode: full
  allow_ood_shape_leakage_for_padding: true
  minigrid:
    iid_env_ids:
      - MiniGrid-Empty-Random-5x5-v0
    ood_env_ids:
      - MiniGrid-Empty-Random-6x6-v0
  train:
    total_timesteps: 512
    learning_rate: 3e-4
    n_steps: 128
    batch_size: 64
    n_epochs: 2
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    device: cpu
    verbose: 0
  eval:
    episodes: 10
    max_steps: 200
