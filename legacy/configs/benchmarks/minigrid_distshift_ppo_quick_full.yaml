seed: 0

benchmark:
  name: minigrid_distshift_ppo_quick_full
  observation_mode: full
  minigrid:
    iid_env_ids:
      - MiniGrid-DistShift1-v0
    ood_env_ids:
      - MiniGrid-DistShift2-v0
  train:
    total_timesteps: 100000
    learning_rate: 3e-4
    n_steps: 256
    batch_size: 256
    n_epochs: 4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    device: cpu
    verbose: 1
  eval:
    episodes: 100
    max_steps: 200
