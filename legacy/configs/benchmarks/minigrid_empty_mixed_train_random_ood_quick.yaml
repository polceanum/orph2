seed: 0

benchmark:
  name: minigrid_empty_mixed_train_random_ood_quick
  observation_mode: full
  allow_ood_shape_leakage_for_padding: true
  minigrid:
    iid_env_ids:
      - MiniGrid-Empty-5x5-v0
      - MiniGrid-Empty-Random-5x5-v0
    ood_env_ids:
      - MiniGrid-Empty-Random-6x6-v0
  train:
    total_timesteps: 80000
    learning_rate: 3e-4
    n_steps: 256
    batch_size: 256
    n_epochs: 4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    device: cpu
    verbose: 1
  eval:
    episodes: 100
    max_steps: 200
