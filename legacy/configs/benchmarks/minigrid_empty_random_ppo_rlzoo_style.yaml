seed: 0

benchmark:
  name: minigrid_empty_random_ppo_rlzoo_style
  observation_mode: full
  allow_ood_shape_leakage_for_padding: true
  minigrid:
    iid_env_ids:
      - MiniGrid-Empty-Random-5x5-v0
    ood_env_ids:
      - MiniGrid-Empty-Random-6x6-v0
  train:
    total_timesteps: 100000
    learning_rate: 2.5e-4
    n_steps: 128
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    device: cpu
    verbose: 1
  eval:
    episodes: 100
    max_steps: 200
