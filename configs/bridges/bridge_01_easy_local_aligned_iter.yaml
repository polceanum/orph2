seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 2
  mechanisms: [0]
  local_use_left_context: false
  param_ranges:
    - [0, 10]
    - [0, 10]
    - [0, 10]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16
  soft_probe_training: true
  soft_probe_temp: 1.0

train:
  batch_size: 32
  lr: 2e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  steps_per_epoch: 140
  epochs: 16
  loss_weights:
    task: 1.0
    probe: 0.6
  approach_entropy_weight: 0.0
  rule_entropy_weight: 0.0
  rule_score_spread_weight: 0.003
  rule_consistency_weight: 0.004
  probe_ig_weight: 0.004
  demo_recon_weight: 0.0
  approach_diversity_weight: 0.001
  rule_diversity_weight: 0.001
  aligned_warmup_steps: 140
  aligned_ramp_steps: 280
  aux_loss_ema_decay: 0.98
  aux_loss_ema_eps: 1e-6
  monitor:
    log_every_steps: 40
    metric: eval_seq_acc_lcb
    metric_ema_beta: 0.5
    mode: max
    min_delta: 0.001
    patience: 6
    warmup_epochs: 3
    enable_early_stop: true
    eval_batches: 12
    eval_section: eval.id
    eval_seed_offset: 777

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0]
    local_use_left_context: false
    param_ranges:
      - [0, 10]
      - [0, 10]
      - [0, 10]
  ood:
    seed_offset: 999
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0]
    local_use_left_context: false
    param_ranges:
      - [10, 16]
      - [10, 16]
      - [10, 16]
