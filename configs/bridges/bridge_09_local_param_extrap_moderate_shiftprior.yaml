seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 3
  mechanisms: [0]
  local_use_left_context: false
  param_ranges:
    - [0, 12]
    - [0, 16]
    - [0, 16]
  input_value_range: [0, 16]
  probe_value_range: [0, 16]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16
  use_demo_shift_prior: true

train:
  batch_size: 32
  lr: 3e-4
  weight_decay: 1e-4
  steps_per_epoch: 120
  epochs: 20
  loss_weights:
    task: 1.0
    probe: 0.0
  approach_entropy_weight: 0.0
  rule_entropy_weight: 0.0
  rule_score_spread_weight: 0.0
  rule_consistency_weight: 0.0
  probe_ig_weight: 0.0
  demo_recon_weight: 0.0
  approach_diversity_weight: 0.0
  rule_diversity_weight: 0.0
  monitor:
    log_every_steps: 20
    metric: eval_seq_acc_lcb
    metric_ema_beta: 0.6
    mode: max
    min_delta: 0.001
    patience: 6
    warmup_epochs: 3
    enable_early_stop: true
    eval_batches: 12
    eval_section: eval.id
    eval_seed_offset: 777

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 3
    mechanisms: [0]
    local_use_left_context: false
    param_ranges:
      - [0, 12]
      - [0, 16]
      - [0, 16]
    input_value_range: [0, 16]
    probe_value_range: [0, 16]
  ood:
    seed_offset: 999
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 3
    mechanisms: [0]
    local_use_left_context: false
    param_ranges:
      - [12, 16]
      - [0, 16]
      - [0, 16]
    input_value_range: [0, 16]
    probe_value_range: [0, 16]
