scenarios:
  - name: bridge_01_local_param
    description: Single mechanism (LOCAL) with param-range OOD shift.
    config: configs/bridges/bridge_01_local_param.yaml
    oracle_config: configs/bridges/bridge_01_local_param_oracle.yaml

  - name: bridge_02_local_switch_param
    description: Two mechanisms (LOCAL+SWITCH) with param-range OOD shift.
    config: configs/bridges/bridge_02_local_switch_param.yaml
    oracle_config: configs/bridges/bridge_02_local_switch_param_oracle.yaml

  - name: bridge_03_mechanism_addition
    description: OOD adds one unseen mechanism (RECURSIVE) while keeping seen ones.
    config: configs/bridges/bridge_03_mechanism_addition.yaml
    oracle_config: configs/bridges/bridge_03_mechanism_addition_oracle.yaml

  - name: bridge_04_context_budget_shift
    description: OOD reduces demos and probe steps (lower context budget).
    config: configs/bridges/bridge_04_context_budget_shift.yaml
    oracle_config: configs/bridges/bridge_04_context_budget_shift_oracle.yaml

  - name: bridge_05_local_switch_param_lowdata
    description: Same OOD as bridge_02 but much less training data.
    config: configs/bridges/bridge_05_local_switch_param_lowdata.yaml
    oracle_config: configs/bridges/bridge_05_local_switch_param_lowdata_oracle.yaml

  - name: bridge_06_local_switch_param_highdata
    description: Same OOD as bridge_02 but much more training data.
    config: configs/bridges/bridge_06_local_switch_param_highdata.yaml
    oracle_config: configs/bridges/bridge_06_local_switch_param_highdata_oracle.yaml
