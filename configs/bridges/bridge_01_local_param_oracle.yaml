seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 2
  mechanisms: [0]
  param_ranges:
    - [10, 16]
    - [10, 16]
    - [10, 16]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16

train:
  batch_size: 32
  lr: 2e-4
  weight_decay: 1e-4
  steps_per_epoch: 100
  epochs: 12
  loss_weights:
    task: 1.0
    probe: 0.2
  entropy_target_mode: track
  approach_entropy_weight: 0.01
  rule_entropy_weight: 0.005
  approach_entropy_target_start: 1.20
  approach_entropy_target_end: 0.75
  rule_entropy_target_start: 1.80
  rule_entropy_target_end: 1.10
  entropy_target_anneal_steps: 1000
  rule_score_spread_weight: 0.004
  rule_consistency_weight: 0.001
  probe_ig_weight: 0.001
  aligned_warmup_steps: 160
  aligned_ramp_steps: 160
  aux_loss_ema_decay: 0.98
  aux_loss_ema_eps: 1e-6

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0]
    param_ranges:
      - [10, 16]
      - [10, 16]
      - [10, 16]
