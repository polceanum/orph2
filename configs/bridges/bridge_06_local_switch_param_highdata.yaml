seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 2
  mechanisms: [0, 2]
  param_ranges:
    - [0, 8]
    - [0, 8]
    - [0, 8]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16

train:
  batch_size: 32
  lr: 2e-4
  weight_decay: 1e-4
  # Higher-data regime.
  steps_per_epoch: 180
  epochs: 20
  loss_weights:
    task: 1.0
    probe: 0.2
  entropy_target_mode: track
  approach_entropy_weight: 0.01
  rule_entropy_weight: 0.005
  approach_entropy_target_start: 1.25
  approach_entropy_target_end: 0.80
  rule_entropy_target_start: 1.90
  rule_entropy_target_end: 1.20
  entropy_target_anneal_steps: 2200
  rule_score_spread_weight: 0.004
  rule_consistency_weight: 0.001
  probe_ig_weight: 0.001
  aligned_warmup_steps: 360
  aligned_ramp_steps: 360
  aux_loss_ema_decay: 0.98
  aux_loss_ema_eps: 1e-6

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0, 2]
    param_ranges:
      - [0, 8]
      - [0, 8]
      - [0, 8]
  ood:
    seed_offset: 999
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0, 2]
    param_ranges:
      - [8, 16]
      - [8, 16]
      - [8, 16]
