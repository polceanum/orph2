seed: 0

env:
  vocab_size: 12
  seq_len: 6
  num_probe_steps: 2
  num_candidate_probes: 5
  num_demos: 3
  mechanisms: [0, 1, 2]
  local_use_left_context: false
  param_ranges:
    - [0, 6]
    - [0, 6]
    - [0, 6]

model:
  d_model: 96
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16
  use_mechanism_router: true
  num_mechanism_experts: 3
  mechanism_router_temperature: 0.7

baselines:
  standard_actor_critic:
    enabled: true
    hidden_dim: 192
    value_loss_weight: 0.2
    normalize_advantage: true
    entropy_weight: 0.01
    pg_weight: 1.0
    pg_clip_eps: 0.0
    sample_probe_temp: 1.0

rl:
  batch_size: 32
  lr: 3e-4
  weight_decay: 1e-4
  epochs: 24
  steps_per_epoch: 120
  ce_weight: 1.0
  pg_weight: 1.0
  entropy_weight: 0.01
  use_critic: true
  value_loss_weight: 0.2
  normalize_advantage: true
  sample_probe_temp: 1.0
  reward_baseline_momentum: 0.9
  eval_batches: 24
  monitor_eval_batches: 6
  early_stop_patience: 5
  early_stop_min_delta: 0.002
  log_every_steps: 40

eval:
  mechanism_breakdown: true
  seed_offset: 123
  id:
    vocab_size: 12
    seq_len: 6
    num_probe_steps: 2
    num_candidate_probes: 5
    num_demos: 3
    mechanisms: [0, 1, 2]
    local_use_left_context: false
    param_ranges:
      - [0, 6]
      - [0, 6]
      - [0, 6]
  ood:
    seed_offset: 999
    vocab_size: 12
    seq_len: 6
    num_probe_steps: 2
    num_candidate_probes: 5
    num_demos: 3
    mechanisms: [0, 1, 2]
    local_use_left_context: false
    param_ranges:
      - [0, 6]
      - [0, 6]
      - [0, 6]
