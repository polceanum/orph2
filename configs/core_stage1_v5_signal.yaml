seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 2
  mechanisms: [0, 2]
  param_ranges:
    - [0, 8]
    - [0, 8]
    - [0, 8]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16
  use_local_adapter: true

train:
  batch_size: 32
  lr: 2e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  steps_per_epoch: 180
  epochs: 24
  loss_weights:
    task: 1.0
    probe: 0.2
  entropy_target_mode: track
  approach_entropy_weight: 0.01
  rule_entropy_weight: 0.005
  approach_entropy_target_start: 1.25
  approach_entropy_target_end: 0.80
  rule_entropy_target_start: 1.90
  rule_entropy_target_end: 1.20
  entropy_target_anneal_steps: 3200
  rule_score_spread_weight: 0.004
  rule_consistency_weight: 0.002
  probe_ig_weight: 0.003
  approach_diversity_weight: 0.001
  rule_diversity_weight: 0.0005
  demo_recon_weight_start: 0.25
  demo_recon_weight_end: 0.05
  demo_recon_anneal_steps: 3200
  aligned_warmup_steps: 240
  aligned_ramp_steps: 360
  aux_loss_ema_decay: 0.98
  aux_loss_ema_eps: 1e-6
  monitor:
    log_every_steps: 60
    metric: eval_seq_acc_lcb
    metric_ema_beta: 0.6
    mode: max
    min_delta: 0.001
    patience: 8
    warmup_epochs: 6
    enable_early_stop: true
    eval_batches: 12
    eval_section: eval.id
    eval_seed_offset: 777

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0, 2]
    param_ranges:
      - [0, 8]
      - [0, 8]
      - [0, 8]
  ood:
    seed_offset: 999
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 2
    mechanisms: [0, 2]
    param_ranges:
      - [8, 16]
      - [8, 16]
      - [8, 16]
