seed: 0

env:
  vocab_size: 16
  seq_len: 8
  num_probe_steps: 3
  num_candidate_probes: 6
  num_demos: 1
  mechanisms: [0, 2]
  param_ranges:
    - [0, 8]
    - [0, 8]
    - [0, 8]

model:
  d_model: 64
  nhead: 4
  num_layers: 2
  num_approaches: 4
  num_rules: 8
  archive_size: 16

train:
  batch_size: 32
  lr: 1.5e-4
  weight_decay: 1e-4
  grad_clip: 1.0
  steps_per_epoch: 120
  epochs: 20
  loss_weights:
    task: 1.0
    probe: 0.2

  entropy_target_mode: track
  approach_entropy_weight: 0.012
  rule_entropy_weight: 0.006
  approach_entropy_target_start: 1.30
  approach_entropy_target_end: 0.95
  rule_entropy_target_start: 2.00
  rule_entropy_target_end: 1.35
  entropy_target_anneal_steps: 1800

  # Keep rule confidence from becoming too peaky too early.
  rule_score_spread_weight: 0.002

  # Strengthen evidence-grounded updates.
  rule_consistency_weight: 0.002
  probe_ig_weight: 0.002
  aligned_warmup_steps: 120
  aligned_ramp_steps: 120
  aux_loss_ema_decay: 0.98
  aux_loss_ema_eps: 1e-6

  # Ground latent state in demonstrations.
  demo_recon_weight_start: 0.10
  demo_recon_weight_end: 0.02
  demo_recon_anneal_steps: 1800

  monitor:
    log_every_steps: 40
    metric: eval_seq_acc_lcb
    metric_ema_beta: 0.6
    mode: max
    min_delta: 0.001
    patience: 6
    warmup_epochs: 6
    enable_early_stop: true
    eval_batches: 8
    eval_section: eval.id
    eval_seed_offset: 777

eval:
  seed_offset: 123
  id:
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 1
    mechanisms: [0, 2]
    param_ranges:
      - [0, 8]
      - [0, 8]
      - [0, 8]
  ood:
    seed_offset: 999
    vocab_size: 16
    seq_len: 8
    num_probe_steps: 3
    num_candidate_probes: 6
    num_demos: 1
    mechanisms: [0, 2]
    param_ranges:
      - [8, 16]
      - [8, 16]
      - [8, 16]
