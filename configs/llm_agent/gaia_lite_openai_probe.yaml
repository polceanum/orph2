seed: 0

benchmark:
  name: gaia_lite_openai_probe
  path: benchmarks/gaia_lite_v0.jsonl
  split: test

model:
  provider: openai
  name: gpt-4.1-mini
  base_url: https://api.openai.com/v1/responses
  fallback_to_mock_on_api_error: true

agent:
  mode: direct
  system_prompt: >
    You are a careful assistant. Answer with only the final answer.

run:
  max_tasks: 1
