seed: 0

benchmark:
  name: local_reasoning_ood_v3_mock_adaptive_tools
  path: benchmarks/local_reasoning_ood_v3.jsonl
  split:

model:
  provider: mock
  name: mock-v0

agent:
  mode: adaptive_router
  self_consistency_k: 7
  use_verifier: true
  use_query_rewrite: true
  use_symbolic_solver: true
  routing_conf_threshold: 0.67
  routing_fast_k: 3
  system_prompt: >
    You are a careful assistant. Reason step by step internally.
    Answer with only the final answer.

run:
  max_tasks: 0
