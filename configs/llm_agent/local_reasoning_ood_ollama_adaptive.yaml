seed: 0

benchmark:
  name: local_reasoning_ood_ollama_adaptive
  path: benchmarks/local_reasoning_ood_v1.jsonl
  split:

model:
  provider: ollama
  name: llama3.1:8b
  base_url: http://127.0.0.1:11434/api/generate

agent:
  mode: adaptive_router
  self_consistency_k: 5
  use_verifier: true
  use_query_rewrite: true
  routing_conf_threshold: 0.67
  routing_fast_k: 3
  system_prompt: >
    You are a careful assistant. Reason step by step internally.
    Answer with only the final answer.

run:
  max_tasks: 0

