seed: 0

benchmark:
  name: minigrid_simple_crossing_ppo_quick
  observation_mode: full
  minigrid:
    iid_env_ids:
      - MiniGrid-SimpleCrossingS9N1-v0
      - MiniGrid-SimpleCrossingS9N2-v0
    ood_env_ids:
      - MiniGrid-SimpleCrossingS9N3-v0
  train:
    total_timesteps: 120000
    learning_rate: 3e-4
    n_steps: 256
    batch_size: 256
    n_epochs: 4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    device: cpu
    verbose: 1
  eval:
    episodes: 100
    max_steps: 200
